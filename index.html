                { text: "我烦透了这种被一束光牵着走的感觉。如果过去真的回不来，我就亲手把它烧了。", type: "REBEL" }
            ]},
            { id: 2, text: "在《麦田里的守望者》里，当你置身于一个满是虚情假意、互相客套的派对，此时你的第一感觉是：", bookInfo: "《麦田里的守望者》：主人公霍尔顿极其厌恶那些虚伪的客套。", options: [
                { text: "心里很不舒服，甚至有点想吐。我只想立刻走人，找个安静的地方待着。", type: "REBEL" },
                { text: "我会冷眼看着这群人表演。在心里默默给他们记上一笔，看他们到底能装到什么时候。", type: "SAGE" },
                { text: "在脑子里躲进一个小屋子。只要我不听，这些假话就伤不到我。", type: "IDEALIST" },
                { text: "觉得挺没劲的，这种无聊没法改变。我得赶紧走，去找点有意思的事干。", type: "WANDERER" }
            ]},
            { id: 3, text: "在《老人与海》里，如果你拼命保护的东西，最后只剩下一副没用的白骨，你会：", bookInfo: "《老人与海》：圣地亚哥带回的只是骨架。这象征了人类绝不认输的劲头。", options: [
                { text: "骨架也是战利品。它证明了我直到最后一刻都没有服软。", type: "HERO" },
                { text: "这就是生活。虽然没成，但我看清了这注定的结局，心里也就踏实了。", type: "SAGE" },
                { text: "把骨架扔回海里。那股搏斗的劲儿已经在我身上了，别的东西不重要。", type: "IDEALIST" },
                { text: "承认自己输得彻彻底底。但明天太阳出来，我还是会再次出海。", type: "WANDERER" }
            ]},
            { id: 4, text: "在《简·爱》里，当你的尊严与一份安稳却要看人眼色的“爱”发生冲突，你会：", bookInfo: "《简·爱》：简·爱拒绝做情妇，选择独自出走。她认领了人格平等的法则。", options: [
                { text: "哪怕在荒地里饿肚子，我也要守住这个独立的自己。我绝不当谁的附庸。", type: "HERO" },
                { text: "这些规矩就是个套。我要挣脱它，不是为了找更好的爱，而是为了不被谁管着。", type: "REBEL" },
                { text: "爱要是让我连尊严都没了，这种爱对我来说就是个错误。", type: "SAGE" },
                { text: "在这种心碎的感觉里，我反而觉得自己真正活过。这种疼，挺真实的。", type: "IDEALIST" }
            ]},
            { id: 5, text: "在《小王子》里，如果有人让你描述一个事物的真相，你会怎么做？", bookInfo: "《小王子》：真相往往是肉眼看不见的。", options: [
                { text: "把它藏进一个盒子里。想象力比直接看到的东西，更能接近真相。", type: "IDEALIST" },
                { text: "把它放在那个看不见的地平线上。只有一直在路上的人，才能慢慢明白。", type: "WANDERER" },
                { text: "把它看作一个永远解不开的谜题。真相从不温柔，它总让人有点难以接受。", type: "SAGE" },
                { text: "我没空去画它。我只想用行动去揭穿那些被大家当成“真相”的假话。", type: "REBEL" }
            ]},
            { id: 6, text: "在《局外人》里，当你得知你必须在众人的审判下结束生命，你最后的态度是：", bookInfo: "《局外人》：默尔索拒绝表演悲伤，这是他对荒诞世界最后的蔑视。", options: [
                { text: "拒绝所有虚伪的安慰。我不需要任何人来解释我这一辈子到底怎么回事。", type: "REBEL" },
                { text: "感受最后一抹晚霞打在脸上的温度。生命原本的样子，比什么道理都真。", type: "IDEALIST" },
                { text: "静静地等着。既然世界就是这样，死也没什么大不了的。", type: "SAGE" },
                { text: "把它看作最后一次放逐。从此我不欠这世界任何东西了，我彻底自由了。", type: "WANDERER" }
            ]},
            { id: 7, text: "在《悉达多》里，你坐在河边听了一整天的流水，你觉得自己学到了什么？", bookInfo: "《悉达多》：河流象征着生命的流动。悟道就是承认当下的状态。", options: [
                { text: "我不再急着去哪了。河流没有尽头，这种一直在路上的感觉就是我的家。", type: "WANDERER" },
                { text: "我感到了某种安稳。原来我这辈子不是一个个碎掉的片段，而是一个整体。", type: "IDEALIST" },
                { text: "我听到了世界的回声。脑子再灵光也弄不明白河流的秘密，得全身心陷进去才行。", type: "SAGE" },
                { text: "我必须亲自跳下去。老在岸上看是没用的，得自己去撞个头破血流才算数。", type: "HERO" }
            ]},
            { id: 8, text: "在《福尔摩斯探案集》里，面对一个谁也解不开的死结，你的反应是：", bookInfo: "《福尔摩斯探案集》：侦探通过观察重构现实，是理性的化身。", options: [
                { text: "少说废话，多看线索。没证据就是在瞎猜。我要找出那个必然的结果。", type: "SAGE" },
                { text: "这案子本身就有种残酷的美。我想看穿那个罪犯到底在想什么，那很有意思。", type: "IDEALIST" },
                { text: "规矩都是给弱者定的。我要靠我的直觉直接拆穿真相，不管合不合程序。", type: "REBEL" },
                { text: "不想管这些破事。真相往往藏在没人愿意去的、最荒凉的地方。", type: "WANDERER" }
            ]},
            { id: 9, text: "在《变形记》里，当你醒来发现自己变成了一只甲虫，你最先感到害怕的是：", bookInfo: "《变形记》：现代派文学。格里高尔醒来变成甲虫，想的却是还要不要上班。", options: [
                { text: "我居然还在想那份烂工作。原来我早就被生活磨得连心都没了。", type: "REBEL" },
                { text: "还是要尽量保持干净利索。哪怕变成虫子，我也得守住最后一点体面。", type: "HERO" },
                { text: "在天花板上爬着的时候，我居然觉得挺自由。我终于不用再看老板脸色了。", type: "WANDERER" },
                { text: "既然身体已经这样了，我就要在心里给自己造一个最干净、最圣洁的梦。", type: "IDEALIST" }
            ]},
            { id: 10, text: "在《堂吉诃德》里，全世界都笑你疯了，正在跟风车打仗，你会停下来吗？", bookInfo: "《堂吉诃德》：疯狂是对旧时代道德的最后守望。", options: [
                { text: "不会。哪怕前面真的是幻觉，我这股子往前冲的劲儿也是真的。", type: "HERO" },
                { text: "这是对那些只知道利益的人最好的嘲笑。我就想看看他们看我犯傻的表情。", type: "IDEALIST" },
                { text: "我知道那是风车，但我得给自己找个借口，去捅开那个死气沉沉的旧规矩。", type: "REBEL" },
                { text: "冲就冲了，没什么理由。等冲过这阵，我会去寻找下一个有意思的幻影。", type: "WANDERER" }
            ]},
            { id: 11, text: "在《白鲸》里，面对那个疯了一样要报仇的亚哈船长，如果你是他的船员：", bookInfo: "《白鲸》：报仇是人类在自然虚无前，最后一点孤独的抗争。", options: [
                { text: "虽然他疯了，但他那股子绝不低头的劲头让我佩服。我愿意跟着他沉下去。", type: "HERO" },
                { text: "冷静地看着他是怎么把自己逼上绝路的。我不仅是看客，更要把这写下来。", type: "SAGE" },
                { text: "这种报仇纯粹是在浪费生命。真理是学会原谅，然后赶紧悄悄离场。", type: "WANDERER" },
                { text: "我不关心那条鱼，我只关心亚哈和鱼死磕的那一刻，那画面美得惊人。", type: "IDEALIST" }
            ]},
            { id: 12, text: "在《包法利夫人》式的生活里，当你发现爱人变得像个毫无生趣的木头：", bookInfo: "《包法利夫人》：由于无法忍受平庸而追求浪漫幻影。", options: [
                { text: "我坚信浪漫肯定还藏在哪。我会拼命从生活里，抠出一点那种梦幻的感觉来。", type: "IDEALIST" },
                { text: "我会用智慧把生活变得有趣点。动动脑筋，日子总还是能过下去的。", type: "SAGE" },
                { text: "直接出走。世界那么大，我没必要在一个死气沉沉的院子里耗着。", type: "WANDERER" },
                { text: "老老实实面对这种枯萎。扛起这份生活的责任，这其实才是我的人格底色。", type: "HERO" }
            ]},
            { id: 13, text: "在博尔赫斯那无尽的图书馆里，当你意识到你一辈子也找不到那本‘真理’：", bookInfo: "《巴别图书馆》：隐喻了宇宙与语言的无限性。", options: [
                { text: "在空白的地方，我自己写个结尾。我的人生得由我自己说了算。", type: "REBEL" },
                { text: "既然找不到真理，我就把寻找的过程做得尽量漂亮、尽量圆满。", type: "SAGE" },
                { text: "化作一阵风。既然找不到头，那我就在无尽的行走中让自己消失。", type: "WANDERER" },
                { text: "在破掉的那一页里，给同样迷路的人留个记号。那记号得带点诗意。", type: "IDEALIST" }
            ]},
            { id: 14, text: "在《傲慢与偏见》的派对上，有权有势的人正在嘲笑你穷，你会：", bookInfo: "《傲慢与偏见》：探讨阶级背景下的独立人格。", options: [
                { text: "用最机智的话怼回去。我不允许任何人把我的人格看成可以买卖的货色。", type: "HERO" },
                { text: "心里明白这只是他们的偏见。我看穿了他们的肤浅，所以我压根儿就不生气。", type: "SAGE" },
                { text: "我觉得在那一刻我拒绝的样子挺帅的。自尊，才是我身上最贵的东西。", type: "IDEALIST" },
                { text: "懒得理他们。这种聚会原本就很无聊，我已经打算溜出去看风景了。", type: "WANDERER" }
            ]},
            { id: 15, text: "在《悲惨世界》里，你捡到了那两个能救命也能送你进监狱的银烛台，你会：", bookInfo: "《悲惨世界》：银烛台象征了慈悲的微光。", options: [
                { text: "把它当成重生的契约。从此我这辈子就是为了救别人而活，直到咽气。", type: "HERO" },
                { text: "这事儿挺讽刺的。我喜欢这种打破常规、让人捉摸不透的慈悲感。", type: "REBEL" },
                { text: "分析这背后的心理平衡。以此为契机，重新理一理我跟这个世界的关系。", type: "SAGE" },
                { text: "那一抹银色的光照亮了黑夜。我觉得那一刻，我好像看到了救赎的美。", type: "IDEALIST" }
            ]},
            { id: 16, text: "在文学的原野里，你希望你的生命带有一种什么样的气味？", bookInfo: "文学流派：不同风格背后是不同的生命态度。", options: [
                { text: "那种带着焦土味的‘优雅劲儿’。哪怕要输了，姿态也得是挺拔的。", type: "HERO" },
                { text: "那种冷静、清透的味道。我能看穿所有被包裹得好好的虚伪外壳。", type: "REBEL" },
                { text: "那种古老纸张的味道。在各种因果联系里，找到最后那点清静。", type: "SAGE" },
                { text: "那种失落花朵的味道。能从气味里，把那些丢掉的时间给找回来。", type: "IDEALIST" }
            ]},
            { id: 17, text: "在《格列佛游记》里，当你看到那些只有理性、没有感情的生物，你会：", bookInfo: "《格列佛游记》：通过对比，讽刺人类的傲慢。", options: [
                { text: "心里挺向往。那里没这么多勾心斗角，只有实话实说和严丝合缝的逻辑。", type: "SAGE" },
                { text: "觉得压抑。没有冲动的世界太像个精致的坟墓了。我还是回我的荒野去吧。", type: "WANDERER" },
                { text: "把这当成一个好玩的样本。心里觉得这些生物为了所谓的“文明”装得挺累。", type: "REBEL" },
                { text: "在那种冰冷的秩序里，找一个能安放我小情绪的、唯美的小漏洞。", type: "IDEALIST" }
            ]},
            { id: 18, text: "在《小王子》里，当你的那朵玫瑰终于谢了，你的第一念头是：", bookInfo: "《小王子》：关于责任与爱。你为它付出的时间让它变得无可替代。", options: [
                { text: "承认这就是时间定下的规矩。把它留进记忆里，慢慢琢磨它衰老的样子。", type: "SAGE" },
                { text: "不信它真的谢了。我会用我的文字和画笔，让它在我的脑子里永远开下去。", type: "IDEALIST" },
                { text: "给它立个没字的碑。然后背上包，去寻找另一片能开出花来的沙漠。", type: "WANDERER" },
                { text: "守着那截枯枝到最后一刻。这是我答应过它的，一定要陪它到底。", type: "HERO" }
            ]},
            { id: 19, text: "当你必须定义你写下的文字有什么用，你的回答是：", bookInfo: "文学功能：解剖现实的刀，还是安置理想的港湾？", options: [
                { text: "一把能切开虚假外表的快刀。它得带着血，捅开所有安稳的假象。", type: "REBEL" },
                { text: "一座精巧的时钟。它让所有的事都在规矩里转动，对上宇宙的节奏。", type: "SAGE" },
                { text: "一盏在雾里闪着的、虚幻的灯。它不负责带路，它只负责好看。", type: "IDEALIST" },
                { text: "一张怎么叠都叠不完的地图。它带我往更远、更没人知道的地方走。", type: "WANDERER" }
            ]},
            { id: 20, text: "如果你是个标点符号，你觉得自己最像哪一个？", bookInfo: "符号美学：叹号是肯定，问号是怀疑，省略号是留白。", options: [
                { text: "！：就算结局是注定要没的，我也要在消失前发出最后一声吼。", type: "HERO" },
                { text: "？：对所有的现成答案都抱有怀疑。怀疑，才是我唯一能确定的事。", type: "REBEL" },
                { text: "……：在没法说话的地方，给灵魂留出一点点安静的、有诗意的褶皱。", type: "IDEALIST" },
                { text: "—：指着远方。说明故事还没完，在看不见的荒野里还在继续。", type: "WANDERER" }
            ]},
            { id: 21, text: "在《尤利西斯》那破碎的意识独白里，你感到了什么？", bookInfo: "《尤利西斯》：展现了内心世界那如潮汐般的流动。", options: [
                { text: "一种乱糟糟的日常感。原来所有的琐碎事儿，其实都有它自己的道理。", type: "SAGE" },
                { text: "一种生理性的厌烦。我只想对这个吵闹、假模假样的世界竖个中指。", type: "REBEL" },
                { text: "内心的流转像水一样真。我正忙着接住那些一闪而过、像发光一样的念头。", type: "IDEALIST" },
                { text: "这只是路过的一个站。我的灵魂不属于这里，我一直就在路上。", type: "WANDERER" }
            ]},
            { id: 22, text: "如果你要给你的自传写第一句话，那会是：", bookInfo: "开场白：文学史上伟大的开头，往往直接预告了整部作品的基调。", options: [
                { text: "“今天，我决定不再对这个世界说假话，也不再对自己撒谎。”", type: "REBEL" },
                { text: "“在故事的一开始，先有了那一抹让我忘不掉的绿光。”", type: "IDEALIST" },
                { text: "“一个人在荒地里走久了，也就慢慢不需要名字了。”", type: "WANDERER" },
                { text: "“天亮了，而我已经准备好去打那场明知道会输的仗。”", type: "HERO" }
            ]},
            { id: 23, text: "当有人逼着你低头认错，向那些陈旧的烂规矩妥协时，你会：", bookInfo: "反抗精神：文学是对“必然”的挑衅。", options: [
                { text: "打心里觉得恶心。我一秒钟也演不下去，哪怕最后结果是彻底崩盘。", type: "REBEL" },
                { text: "握紧拳头，想想怎么在不丢面子的情况下，守住我作为人的底线。", type: "HERO" },
                { text: "闭上眼睛。在心里屏蔽掉这些脏东西，守住我理想里那点干净的地方。", type: "IDEALIST" },
                { text: "觉得特别无聊。这种没劲的较劲，只会让我更想赶紧离开这儿。", type: "WANDERER" }
            ]},
            { id: 24, text: "你怎么看那个早就定好了的结局？", bookInfo: "叙事终局：智者看重圆满，流浪者看重远方，英雄看重牺牲。", options: [
                { text: "结局就是到头了。像个完美的圆圈，谁也改动不了它的样子。", type: "SAGE" },
                { text: "没有结局。我就是得一直推着那块石头上山，那个过程就是全部。", type: "HERO" },
                { text: "结局得是一个唯美的瞬间。在那一刻爆发后，让一切都归于安静。", type: "IDEALIST" },
                { text: "结局只是新一页的开头。真正的惊喜，永远都在地平线下面。", type: "WANDERER" }
            ]},
            { id: 25, text: "如果你能穿越回去改一个人的命，你会去找谁？", bookInfo: "悲剧核心：哈姆雷特的犹豫，林黛玉的眼泪，都是性格注定的结。", options: [
                { text: "《哈姆雷特》：让他别再纠结了，赶紧想个法子把眼前的烂事儿解决掉。", type: "SAGE" },
                { text: "《红楼梦》：在那个大园子被烧掉前，记下那些极致干净、带血的美感。", type: "IDEALIST" },
                { text: "《1984》：把那个秘密的小角落，变成永远不会被攻占的石头堡垒。", type: "REBEL" },
                { text: "《百年孤独》：带着全家人走出那块泥沼地，去寻找下一片新大陆。", type: "WANDERER" }
            ]},
            { id: 26, text: "站在那片“深渊”边上，你会怎么做？", bookInfo: "深渊意象：尼采说“当你凝视深渊，深渊也在凝视你”。", options: [
                { text: "理清它的深度。理性能让我保持清醒，不至于被它吸进去。", type: "SAGE" },
                { text: "往里投一颗发光的石子。我想看看它掉下去的样子，哪怕只有一瞬间。", type: "IDEALIST" },
                { text: "直接跳下去。既然世界这么扯淡，深渊可能才是唯一的实话。", type: "REBEL" },
                { text: "在边上坐下，吹吹深渊里出来的冷风。然后，继续我那没头的漫游。", type: "WANDERER" }
            ]},
            { id: 27, text: "在《俄狄浦斯王》里，要是你早知道无论怎么逃，那个惨结局都会在那儿等着：", bookInfo: "《俄狄浦斯王》：它提出了关于意志与宿命的终极拷问。", options: [
                { text: "既然肉眼看不见真理，那我也就不需要这双眼睛了。我宁愿在黑暗里认领我的命。", type: "REBEL" },
                { text: "冷眼看着命运是怎么一环扣一环把我也套进去的。这种注定感也挺有规矩的。", type: "SAGE" },
                { text: "虽然结局在那儿，但我找真相的过程本身，就是我最后的尊严。", type: "HERO" },
                { text: "在悲剧发生前赶紧走。就算注定了，我也要在跑路的路上耗掉剩下的时间。", type: "WANDERER" }
            ]},
            { id: 28, text: "在《等待戈多》里，要是那个人始终没来，你还会一直等下去吗？", bookInfo: "《等待戈多》：戈多代表了那些我们盼着、却永远不会到的东西。", options: [
                { text: "我会继续等。这种明明没指望还要等下去的劲儿，才是我活着的证明。", type: "HERO" },
                { text: "我会走人。戈多不来，我就去造个戈多，或者去钻钻别的洞。", type: "WANDERER" },
                { text: "我会理理“等”这回事。研究一下大家为什么都在这儿耗着，这更有意思。", type: "SAGE" },
                { text: "我会对着那棵树大笑。既然谁也没等来，那就干脆让这荒诞劲儿闹到底吧。", type: "REBEL" }
            ]},
            { id: 29, text: "当你突然发现人生其实就是一场巨大的恶作剧，你会：", bookInfo: "现代派美学：文学不再是救赎，而是一面冷酷的镜子。", options: [
                { text: "在恶作剧里定个我自己的规矩。这是让自己不被牵着鼻子走的唯一办法。", type: "SAGE" },
                { text: "既然是一场梦，那我就把它做成最美的那一个。美，是我最后的防线。", type: "IDEALIST" },
                { text: "我咽不下这口气。临走前，我得对这个搞鬼的导演竖个中指。", type: "REBEL" },
                { text: "大笑着跑开。只要我跑得够快，这个恶心人的恶作剧就追不上我。", type: "WANDERER" }
            ]},
            { id: 30, text: "如果这辈子最后只能变成一本书，你希望封底刻着哪句话？", bookInfo: "终极命题：每一个选择，都是在为你的灵魂副本签名。", options: [
                { text: "“他认领了自己的名字，并在众神的注视下，打完了那场明知必输的仗。”", type: "HERO" },
                { text: "“作者在理性的巅峰处消失了。这是一份关于真相的最清醒的报告。”", type: "SAGE" },
                { text: "“他从来不属于这里。他只是一阵吹过文明废墟的、咸丝丝的海风。”", type: "WANDERER" },
                { text: "“满纸写的都是心里流出来的血。他撕碎了所有的面具，在大雾里走了。”", type: "REBEL" }
            ]}
        ];

        const StridingBirdIllustration = () => (
            <svg viewBox="0 0 400 400" className="w-full h-full">
                <circle cx="80" cy="100" r="15" fill="white" opacity="0.05" />
                <circle cx="320" cy="150" r="20" fill="white" opacity="0.05" />
                <line x1="180" y1="260" x2="140" y2="330" className="bird-leg" />
                <line x1="220" y1="260" x2="280" y2="330" className="bird-leg" />
                <line x1="140" y1="330" x2="110" y2="335" className="bird-leg" />
                <line x1="280" y1="330" x2="315" y2="295" className="bird-leg" />
                <path d="M150 200 Q 180 150 250 200 Q 300 220 320 260 L 180 260 Z" className="bird-body" />
                <path d="M150 200 Q 130 200 100 215 L 145 230 Z" fill="#2a6fdb" />
                <path d="M165 210 Q 175 205 185 210" fill="none" stroke="white" strokeWidth="2" opacity="0.8" />
                <path d="M200 230 Q 240 220 280 240" fill="none" stroke="white" strokeWidth="1" opacity="0.3" />
                <ellipse cx="200" cy="345" rx="100" ry="5" fill="white" opacity="0.1" />
            </svg>
        );

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [scores, setScores] = useState({ REBEL: 0, SAGE: 0, IDEALIST: 0, WANDERER: 0, HERO: 0 });
            const [history, setHistory] = useState([]);
            const [result, setResult] = useState(null);
            const [isSaving, setIsSaving] = useState(false);

            const radarCanvas = useRef(null);
            const captureRef = useRef(null);
            const chartRef = useRef(null);

            const handleAnswer = (type) => {
                const newScores = { ...scores, [type]: scores[type] + 1 };
                setHistory([...history, { scores, currentQuestion }]);
                setScores(newScores);
                if (currentQuestion < 29) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    const topArchetype = Object.keys(newScores).reduce((a, b) => newScores[a] > newScores[b] ? a : b);
                    const MAP = {
                        REBEL: ["MEURSAULT", "HOLDEN", "RASKOLNIKOV", "OFFRED", "HESTER"],
                        SAGE: ["SIDDHARTHA", "HOLMES", "ELIZABETH", "DALLOWAY", "ORLANDO"],
                        IDEALIST: ["GATSBY", "QUIXOTE", "BOVARY", "JO_MARCH"],
                        WANDERER: ["ISHMAEL", "TESS", "DALLOWAY", "ORLANDO"],
                        HERO: ["SANTIAGO", "JANE_EYRE", "VALJEAN", "KARENINA"]
                    };
                    const pool = MAP[topArchetype] || ["GATSBY"];
                    const key = pool[Math.floor(Math.random() * pool.length)];
                    setResult(ARCHETYPES[key]);
                    setStep('result');
                    window.scrollTo(0, 0);
                }
            };

            const handleBack = () => { if (history.length > 0) { const last = history.pop(); setScores(last.scores); setCurrentQuestion(last.currentQuestion); setHistory([...history]); } else setStep('welcome'); };
            const handleRestart = () => { if (chartRef.current) chartRef.current.destroy(); chartRef.current = null; setStep('welcome'); setCurrentQuestion(0); setScores({ REBEL: 0, SAGE: 0, IDEALIST: 0, WANDERER: 0, HERO: 0 }); setHistory([]); setResult(null); window.scrollTo(0, 0); };

            useEffect(() => {
                if (step === 'result' && result && radarCanvas.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    const ctx = radarCanvas.current.getContext('2d');
                    chartRef.current = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['反叛', '智性', '感性', '自由', '意志'],
                            datasets: [{ data: result.stats, backgroundColor: 'rgba(241, 196, 15, 0.15)', borderColor: COLORS.accentYellow, borderWidth: 1.5, pointRadius: 2, pointBackgroundColor: COLORS.accentYellow }]
                        },
                        options: { scales: { r: { angleLines: { color: 'rgba(255,255,255,0.1)' }, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { display: false }, pointLabels: { color: '#a5c6e5', font: { size: 10 } }, min: 0, max: 100 } }, plugins: { legend: { display: false } } }
                    });
                }
            }, [step, result]);

            const saveAsImage = async () => {
                if (typeof html2canvas === 'undefined') return;
                setIsSaving(true);
                try {
                    const canvas = await html2canvas(captureRef.current, { scale: 2, backgroundColor: COLORS.bg, useCORS: true });
                    const link = document.createElement('a');
                    link.download = `文学报告-${result.name}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (err) { console.error(err); }
                setIsSaving(false);
            };

            return (
                <div className="max-w-xl mx-auto px-4 py-8 min-h-screen">
                    {step === 'welcome' && (
                        <div className="animate-fade-in text-center space-y-12">
                            <div className="text-left pt-6">
                                <div className="inline-block px-3 py-1 bg-[#f2f0e9] text-[#123e66] text-[9px] tracking-widest font-sans mb-4 transform -rotate-2 uppercase font-bold">Archetype Analysis</div>
                                <h1 className="text-4xl md:text-5xl font-light leading-tight tracking-widest text-white">你是文学里的<br /><span className="font-bold border-b-4 border-[#f1c40f]">哪位主角？</span></h1>
                            </div>
                            <div className="w-full max-w-[360px] mx-auto aspect-square relative">
                                <StridingBirdIllustration />
                            </div>
                            <div className="space-y-10">
                                <div className="glass-card p-6 rounded-2xl text-left space-y-4">
                                    <div className="flex gap-4 border-b border-white border-opacity-10 pb-4">
                                        <div className="flex-1 text-center">
                                            <div className="text-[14px] font-bold text-[#f1c40f]">20</div>
                                            <div className="text-[8px] opacity-40 uppercase">文学主角原型</div>
                                        </div>
                                        <div className="flex-1 text-center border-l border-white border-opacity-10">
                                            <div className="text-[14px] font-bold text-[#f1c40f]">30</div>
                                            <div className="text-[8px] opacity-40 uppercase">生存叙事冲突</div>
                                        </div>
                                        <div className="flex-1 text-center border-l border-white border-opacity-10">
                                            <div className="text-[14px] font-bold text-[#f1c40f]">5D</div>
                                            <div className="text-[8px] opacity-40 uppercase">人格分析维度</div>
                                        </div>
                                    </div>
                                    <p className="text-xs text-[#a5c6e5] leading-relaxed italic opacity-80">“创作是从看见自己开始的，而文学，是你在精神废墟上重建主体性的最后一次存证。”</p>
                                </div>
                                <button onClick={() => setStep('quiz')} className="w-full py-6 glass-card text-white text-[11px] tracking-[0.8em] font-bold flex items-center justify-center transition-all shadow-lg active:scale-95">开启漫游 / PROCEED</button>
                                <div className="text-[10px] text-gray-400 tracking-[0.3em]">Based on Library of Souls | Final Edition</div>
                            </div>
                        </div>
                    )}

                    {step === 'quiz' && (
                        <div className="animate-fade-in space-y-8 text-center pb-12">
                            <div className="flex justify-between items-center border-b border-white border-opacity-10 pb-4">
                                <button onClick={handleBack} className="flex items-center gap-1 text-[10px] uppercase text-[#a5c6e5] hover:text-white transition-all">BACK</button>
                                <span className="text-[9px] uppercase text-[#a5c6e5] font-bold tracking-widest">CHAPTER {String(currentQuestion + 1).padStart(2, '0')} / 30</span>
                                <div className="w-10"></div>
                            </div>
                            <div className="space-y-4">
                                <h2 className="text-lg md:text-xl leading-relaxed min-h-[100px] flex items-center justify-center italic px-4 text-white font-light">{QUESTIONS[currentQuestion].text}</h2>
                            </div>
                            <div className="space-y-4 text-left">
                                {QUESTIONS[currentQuestion].options.map((option, idx) => (
                                    <button key={idx} onClick={() => handleAnswer(option.type)} className="w-full p-6 glass-card rounded-[16px] hover:bg-white hover:bg-opacity-10 transition-all text-left group active:bg-opacity-20">
                                        <span className="text-[14px] text-[#f2f0e9] group-hover:text-white leading-relaxed pr-4">{option.text}</span>
                                    </button>
                                ))}
                            </div>
                            <div className="book-archive-card p-5 rounded-2xl text-left animate-fade-in">
                                <div className="flex items-center gap-2 mb-2">
                                    <div className="w-1 h-3 bg-[#f1c40f]"></div>
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-[#f1c40f]">Masterpiece Archive / 名著档案</span>
                                </div>
                                <p className="text-[11px] leading-relaxed text-[#a5c6e5] opacity-90 italic">{QUESTIONS[currentQuestion].bookInfo}</p>
                            </div>
                            <div className="pt-6 flex justify-center">
                                <div className="h-[2px] w-48 bg-white bg-opacity-10 relative"><div className="h-full bg-[#f1c40f] transition-all duration-700 shadow-[0_0_10px_#f1c40f]" style={{width: `${((currentQuestion+1)/30)*100}%`}}></div></div>
                            </div>
                        </div>
                    )}

                    {step === 'result' && result && (
                        <div className="animate-fade-in space-y-8 pb-12">
                            <div ref={captureRef} className="p-4 space-y-12 bg-[#123e66]">
                                <div className="text-center space-y-6 py-12 glass-card rounded-2xl relative overflow-hidden border border-white border-opacity-10">
                                    <span className="text-[10px] font-bold uppercase tracking-[0.5em] text-[#f1c40f]">Protagonist Archetype Profile</span>
                                    <h2 className="text-3xl md:text-4xl font-bold text-white tracking-widest px-2">{result.name}</h2>
                                    <p className="text-sm text-[#a5c6e5] italic tracking-[0.4em]">{result.sub}</p>
                                    <div className="flex justify-center gap-4 pt-4">
                                        <span className="px-3 py-1 bg-[#f1c40f] text-[#123e66] text-[9px] font-bold uppercase">灵魂副本存证</span>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center glass-card p-8 rounded-2xl relative border border-white border-opacity-10">
                                    <div className="absolute -top-3 -right-3 px-3 py-1 bg-[#f1c40f] text-[#123e66] text-[10px] font-bold transform rotate-3 shadow-lg">DOC: LITERARY-SOUL</div>
                                    <div className="space-y-4 text-left">
                                        <h4 className="text-[11px] font-bold border-b border-white border-opacity-10 pb-2 text-white uppercase tracking-wider">人格分析维度</h4>
                                        <div className="space-y-3 text-[10px]">
                                            <div className="flex justify-between items-center text-[#a5c6e5]"><span>意志/尊严</span><div className="w-24 h-1 bg-white bg-opacity-10"><div className="h-full bg-[#e4979e]" style={{width:`${result.stats[4] || 80}%`}}></div></div></div>
                                            <div className="flex justify-between items-center text-[#a5c6e5]"><span>智性/逻辑</span><div className="w-24 h-1 bg-white bg-opacity-10"><div className="h-full bg-[#35afcb]" style={{width:`${result.stats[1]}%`}}></div></div></div>
                                            <div className="flex justify-between items-center text-[#a5c6e5]"><span>自由/反叛</span><div className="w-24 h-1 bg-white bg-opacity-10"><div className="h-full bg-[#f1c40f]" style={{width:`${result.stats[0]}%`}}></div></div></div>
                                        </div>
                                    </div>
                                    <div className="aspect-square w-full max-w-[200px] mx-auto"><canvas ref={radarCanvas}></canvas></div>
                                </div>
                                <div className="relative p-12 glass-card border border-white border-opacity-10 rounded-2xl text-center">
                                    <p className="text-xl leading-relaxed mb-6 font-medium text-white italic">“{result.quote}”</p>
                                    <div className="text-[10px] text-[#f1c40f] tracking-widest uppercase font-bold text-center">— {result.quoteSource} —</div>
                                </div>
                                <div className="space-y-10 px-2 text-left">
                                    <section className="space-y-4">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-white border-opacity-10 pb-2 text-[#a5c6e5]">灵魂解剖 / THE ESSENCE</h4>
                                        <div className="p-6 border-l-4 border-[#f1c40f] glass-card rounded-r-2xl space-y-4">
                                            <p className="text-[13px] leading-relaxed text-[#a5c6e5] italic">“{result.identity}”</p>
                                            <p className="text-[13px] leading-relaxed font-light text-white opacity-90">{result.longDesc}</p>
                                        </div>
                                    </section>
                                    <section className="space-y-4">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-white border-opacity-10 pb-2 text-[#e4979e]">核心焦虑与阴影</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-[12px]">
                                            <div className="p-4 bg-white bg-opacity-5 rounded-xl border border-white border-opacity-10">
                                                <div className="font-bold mb-1 text-[#e4979e]">主导焦虑</div>
                                                <div className="text-white opacity-70">{result.anxiety}</div>
                                            </div>
                                            <div className="p-4 bg-white bg-opacity-5 rounded-xl border border-white border-opacity-10">
                                                <div className="font-bold mb-1 text-[#a5c6e5]">人格阴影</div>
                                                <div className="text-white opacity-70">{result.shadow}</div>
                                            </div>
                                        </div>
                                    </section>
                                    <section className="space-y-6">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-white border-opacity-10 pb-2 text-[#a5c6e5]">关联阅读推荐</h4>
                                        <div className="grid gap-4">
                                            {result.books && result.books.map((book, i) => (
                                                <div key={i} className="glass-card p-6 rounded-2xl border border-white border-opacity-10 group">
                                                    <h5 className="text-[15px] font-bold mb-1 text-white">{book.title}</h5>
                                                    <p className="text-10px text-[#f1c40f] font-bold mb-2 uppercase">作者: {book.author}</p>
                                                    <p className="text-xs text-[#a5c6e5] italic leading-relaxed">{book.desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>
                            <div className="pt-8 space-y-4 text-center px-4">
                                <button onClick={saveAsImage} disabled={isSaving} className="w-full py-5 bg-[#f1c40f] text-[#123e66] text-[11px] font-bold uppercase tracking-[0.5em] flex items-center justify-center gap-3 shadow-[0_10px_30px_rgba(241,196,15,0.3)] active:scale-95 transition-all">{isSaving ? "生成中..." : "保存灵魂手稿 / SAVE REPORT"}</button>
                                <button onClick={handleRestart} className="w-full py-5 border border-white border-opacity-20 text-white text-[11px] font-bold uppercase tracking-[0.5em] hover:bg-white hover:bg-opacity-5 transition-all">重新开启叙事</button>
                            </div>
                        </div>
                    )}
                    <footer className="mt-16 pt-16 border-t border-white border-opacity-10 text-center space-y-4">
                        <p className="text-[10px] tracking-[0.6em] uppercase text-[#a5c6e5] font-bold opacity-60">© 2026 CURATED BY @云树CLOUDTREE</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
