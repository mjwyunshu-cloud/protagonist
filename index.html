            ]},
            { id: 2, text: "在《麦田里的守望者》里，当你置身于一个充满‘虚伪寒暄’的派对，此时你的生理反应是：", bookInfo: "《麦田里的守望者》：主人公霍尔顿极其厌恶成年世界的‘虚伪’（Phony）。", options: [
                { text: "感到一种物理层面的反胃。我只想立刻消失，去那个谁也不认识我的冰冷公园坐坐。", type: "REBEL" },
                { text: "我会冷眼观察这场拙劣的群像剧。观察他们的伪善是如何逻辑自洽的，然后写进我的秘密账簿。", type: "SAGE" },
                { text: "在脑海里建立一个隔绝噪音的避难所。只要我不听，这个充满谎言的世界就伤不到我。", type: "IDEALIST" },
                { text: "意识到这种无聊是不可抗力的，于是我决定背起行囊，去寻找下一片更真实的风景。", type: "WANDERER" }
            ]},
            { id: 3, text: "在《老人与海》里，如果你在绝境中拼死保卫的东西，最后只剩下一副‘骨架’，你会：", bookInfo: "《老人与海》：圣地亚哥带回的只是骨架。这象征了人类依然坚持斗争的尊严。", options: [
                { text: "骨架也是勋章。它证明了我直到最后一刻都没有交出我的尊严。", type: "HERO" },
                { text: "这只是自然法则的一场演示。虽然输了，但我看清了这场必败结局背后的精密因果。", type: "SAGE" },
                { text: "把骨架扔回大海。那种搏斗的美感已经属于我了，实物本身毫无意义。", type: "IDEALIST" },
                { text: "承认自己是个彻头彻尾的失败者。但在下一次潮汐来临时，我会再次出海。", type: "WANDERER" }
            ]},
            { id: 4, text: "在《简·爱》里，当你的尊严与一份安稳却依附的‘爱’发生冲突，你的灵魂决定是：", bookInfo: "《简·爱》：简·爱拒绝做罗切斯特的情妇，选择独自出走。她确立了人格平等的法则。", options: [
                { text: "哪怕在荒原里流浪挨饿，我也要换取一个完整、独立的自我。我不做任何人的附庸。", type: "HERO" },
                { text: "这规则本身就是锁链。我要打破它，不是为了寻找更好的爱，而是为了不被任何东西定义。", type: "REBEL" },
                { text: "计算出情感的边际成本。如果爱会导致自我的瘫痪，那这种爱就是一种智性上的错误。", type: "SAGE" },
                { text: "在这种痛苦的撕裂中捕捉那种极致的悲剧感。这种阵痛，是我活过的最真实证据。", type: "IDEALIST" }
            ]},
            { id: 5, text: "在《小王子》里，如果有人要求你描绘一个‘真相’，你会把答案放在哪？", bookInfo: "《小王子》：关于本质与表象。真相往往是肉眼看不见的。", options: [
                { text: "放在一个密封的箱子里。想象力比直接的呈现，更接近事物的核心逻辑。", type: "IDEALIST" },
                { text: "放在那个离家万里的地平线上。真相只有在不断的行走和漫游中才会显露。", type: "WANDERER" },
                { text: "放在一个充满悖论的公式里。真相从不温柔，它往往是一个冰冷且不可调和的逻辑闭环。", type: "SAGE" },
                { text: "我没空去描绘它。我只想用我的行动去拆穿那些被大众公认为‘真相’的谎言。", type: "REBEL" }
            ]},
            { id: 6, text: "在《局外人》里，当你得知你必须在众人的审判下结束生命，你最后的抗争是：", bookInfo: "《局外人》：默尔索拒绝在法庭上为了博取同情而表演悲伤。", options: [
                { text: "拒绝所有的宗教宽恕。我不允许任何人用那套虚伪的逻辑来解释我的人生。", type: "REBEL" },
                { text: "感受最后一抹晚霞打在脸上的温度。与其谈论正义，不如谈论生命本身那原始的质感。", type: "IDEALIST" },
                { text: "静静地等待行刑，像是在看一场与我无关的戏。既然世界荒诞，死亡也就毫无逻辑可言。", type: "SAGE" },
                { text: "将这一刻视为一次绝对的放逐。从此我不再属于任何社会，我只属于虚无本身。", type: "WANDERER" }
            ]},
            { id: 7, text: "在《悉达多》里，你坐在河边听了一整天的流水，你认为自己‘认领’到了什么？", bookInfo: "《悉达多》：河流象征着生命的圆轮。悟道的过程就是承认当下的流动性。", options: [
                { text: "我不再急于抵达彼岸。河流没有终点，不断的流转本身就是我一直寻找的家。", type: "WANDERER" },
                { text: "我感到了某种神圣的宁静。原来我的人生并不是一系列孤立的节点，而是一场和谐的共振。", type: "IDEALIST" },
                { text: "我听到了万物的回声。逻辑无法穷尽河流的秘密，只有彻底的沉浸才能换取真理。", type: "SAGE" },
                { text: "我必须亲自跳下去，哪怕被淹没也要换取真实的痛感，而非在岸上观望。", type: "HERO" }
            ]},
            { id: 8, text: "在《福尔摩斯探案集》里，面对一桩看似毫无线索的‘死局’，你的本能反应是：", bookInfo: "《福尔摩斯探案集》：侦探通过细致入微的观察重构现实，是近代智性的化身。", options: [
                { text: "数据，数据！没有证据的推论是逻辑的自残。我要在废墟里剥离出必然的线索。", type: "SAGE" },
                { text: "案子本身就是一场行为艺术。我想看穿罪犯灵魂中的那个‘坏种子’，那很有美感。", type: "IDEALIST" },
                { text: "规则只是弱者的掩护。我要用我的直觉直接击穿正义的表象，管它合不合法。", type: "REBEL" },
                { text: "从这些琐事中抽离。真相往往藏在最辽阔、最不为人知的荒野里。", type: "WANDERER" }
            ]},
            { id: 9, text: "在《变形记》里，当你醒来发现自己变成了一只丑陋的甲虫，你首先感到绝望的是：", bookInfo: "《变形记》：现代派文学的起源。格里高尔醒来变成甲虫，想的却是如何去赶火车上班。", options: [
                { text: "我还在担心那份卑微的工作。原来比身体变形更可怕的，是我已经被异化的生存逻辑。", type: "REBEL" },
                { text: "依然试图维持房间的秩序。即便是作为甲虫，我也要守住作为‘人’最后的自律。", type: "HERO" },
                { text: "在天花板上爬行时，我感到了前所未有的自由。我终于不用再扮演那个勤恳的职员了。", type: "WANDERER" },
                { text: "既然肉体已经如此丑陋，我就要在脑海里构思一个最圣洁、最不容玷污的幻梦。", type: "IDEALIST" }
            ]},
            { id: 10, text: "在《堂吉诃德》里，当所有人都嘲笑你正向着风车冲锋，你握紧长矛的手是否会颤抖？", bookInfo: "《堂吉诃德》：堂吉诃德的“疯狂”实则是对旧时代高尚道德的守望。", options: [
                { text: "不会。即便前方真的是巨人的幻觉，我的忠诚和我的冲锋也是真实不虚的。", type: "HERO" },
                { text: "这是一种对平庸理性最华丽的嘲讽。我享受这种‘知其不可而为之’的悲剧美感。", type: "IDEALIST" },
                { text: "我知道那是风车，但我必须以此为借口去打破那个死气沉沉的社会规则。", type: "REBEL" },
                { text: "冲锋只是一种姿态。一旦穿过这片旷野，我会寻找下一个更有趣的幻象。", type: "WANDERER" }
            ]},
            { id: 11, text: "在《白鲸》里，面对亚哈船长那近乎疯狂的复仇欲望，如果你是船员，你会：", bookInfo: "《白鲸》：深海史诗。复仇象征了人类在面对自然虚无时，最后一点孤独的抗争。", options: [
                { text: "虽然他疯狂，但在这种毁灭性的意志中我看到了人的尊严。我愿意随他沉入深海。", type: "HERO" },
                { text: "冷静地观察这种偏执如何导致逻辑的坍塌。我不仅是参与者，更是最后的记录者。", type: "SAGE" },
                { text: "这种复仇是对大海的亵渎。真正的自由在于宽恕那种原始力量，然后悄悄离场。", type: "WANDERER" },
                { text: "我不关心白鲸，我只关心亚哈和白鲸决斗时，那一刻跨越生死的深海美学。", type: "IDEALIST" }
            ]},
            { id: 12, text: "在《包法利夫人》式的生活中，当你感到爱人已彻底沦为‘生活的摆件’，你会：", bookInfo: "《包法利夫人》：批判现实主义杰作。爱玛因无法忍受平庸的世俗生活而追求浪漫幻影。", options: [
                { text: "坚信那束‘绿光’还在。我会拼命在琐碎的现实里，复刻出那些在书里读到的极致浪漫。", type: "IDEALIST" },
                { text: "通过机智和知识去点亮这枯燥的关系。认知层次的提升，是修补日常裂缝的唯一逻辑。", type: "SAGE" },
                { text: "独自远行。天地广阔，我不必在一座死水般的庄园里寻找自我的归宿。", type: "WANDERER" },
                { text: "直面这种枯萎。承担起生活的重担，哪怕这会让我筋疲力尽，这也是我人格的修辞。", type: "HERO" }
            ]},
            { id: 13, text: "在《巴别图书馆》那无限的书架间，当你意识到你永远找不到那本‘真理’，你会：", bookInfo: "《巴别图书馆》：它隐喻了宇宙与语言的无限性。", options: [
                { text: "在书页的空白处，由我自己写下一个不属于任何系统的结局。我就是我自己的作者。", type: "REBEL" },
                { text: "既然真理不存在，我就要把搜寻真理的逻辑过程，编织成一个完美的闭环。", type: "SAGE" },
                { text: "化作一阵无法被文字定义的风。既然书架无尽，那我就要在无尽的漫游中彻底消失。", type: "WANDERER" },
                { text: "在破损的页脚里，为那些同样迷路的灵魂留下一个唯美且带有怜悯的记号。", type: "IDEALIST" }
            ]},
            { id: 14, text: "在《傲慢与偏见》式的舞会上，面对权贵的傲慢与嘲讽，你维持体面的方式是：", bookInfo: "《傲慢与偏见》：探讨了如何在阶级壁垒深厚的社会中，依靠独立心智赢得尊重。", options: [
                { text: "用最锋利的机智回击。我不允许任何人将我的人格物化为某种可以交易的筹码。", type: "HERO" },
                { text: "冷静分析傲慢背后的社会偏见模型。我看穿了你的逻辑缺陷，所以我并不感到受伤。", type: "SAGE" },
                { text: "我觉得那一刻我拒绝的姿态非常具有古典美。我的自尊，是我最昂贵的配饰。", type: "IDEALIST" },
                { text: "无所谓。这类舞会不过是平庸生存的排场。我已经在构思下一站的逃离了。", type: "WANDERER" }
            ]},
            { id: 15, text: "在《悲惨世界》里，当你捡到了那两个能救你命、也能让你下地狱的银烛台：", bookInfo: "《悲惨世界》：两个银烛台象征了来自他人的善念——足以照亮深渊并启动救赎。", options: [
                { text: "将其视为重生的契约。从此我将背负起救赎他人的沉重十字架，直到生命终结。", type: "HERO" },
                { text: "这是一种对法律逻辑的暴力嘲讽。我享受这种规则之外的慈悲所带来的混乱感。", type: "REBEL" },
                { text: "分析这背后的宗教补偿心理。以此为契机，重新构建我与这个世界的逻辑连接。", type: "SAGE" },
                { text: "银色的火光照亮了黑夜。在那一刻，救赎本身就是一种神圣且不可直视的美学。", type: "IDEALIST" }
            ]},
            { id: 16, text: "在文学流派的森林里，你更愿意让你的生命带有哪种‘墨水’的气味？", bookInfo: "文学流派：每种风格背后都是一种截然不同的生命体验。", options: [
                { text: "那种带着焦土与硝烟味的‘重压下的优雅’。面对毁灭，依然要保持不屈的风度。", type: "HERO" },
                { text: "那种冷静、带有福尔马林气息的‘荒诞直觉’。我看穿了所有体制的虚幻外壳。", type: "REBEL" },
                { text: "那种交织着古老羊皮纸与镜子气息的‘智性闭环’。在因果中寻找最后的安宁。", type: "SAGE" },
                { text: "那种带有失落丁香与尘土气息的‘感官共振’。在气味中唤醒失去的时间。", type: "IDEALIST" }
            ]},
            { id: 17, text: "在《格列佛游记》里，当你见证了马类文明那种‘绝对理性’的冰冷，你会：", bookInfo: "《格列佛游记》：通过对比，尖锐地质疑了人类自诩为“万物之灵”的傲慢。", options: [
                { text: "感到向往。那里没有人类的卑劣与虚伪，只有纯粹的诚实和严密的逻辑。", type: "SAGE" },
                { text: "感到窒息。没有感性冲动的世界不过是一座精致的坟墓。我要回我的荒野去。", type: "WANDERER" },
                { text: "将其作为观察样本。以造物主的视角审视不同种族在‘文明’这一概念下的可笑表演。", type: "REBEL" },
                { text: "在那种冰冷的秩序中，寻找一个能安放我感性理想的、微小且唯美的漏洞。", type: "IDEALIST" }
            ]},
            { id: 18, text: "在《小王子》里，当你的那朵玫瑰终于凋谢了，你的第一反应是：", bookInfo: "《小王子》：关于爱与责任。玫瑰是唯一的，因为你为它付出的时间。", options: [
                { text: "承认这是时间的必然逻辑。将它制成标本，在记忆的折痕里研究衰老的过程。", type: "SAGE" },
                { text: "拒绝接受。我会用我的文字和画笔，让它在我的脑海里永恒地、唯美地绽放。", type: "IDEALIST" },
                { text: "为它立一块无字的碑。然后背起行囊，去寻找另一片能开出玫瑰的沙漠。", type: "WANDERER" },
                { text: "守在它的枯枝旁直到最后一刻。这是我作为守护者，对这段叙事最后的承诺。", type: "HERO" }
            ]},
            { id: 19, text: "当被要求定义你的‘文字价值’，你认为它是：", bookInfo: "文学功能：可以是解剖现实的刀，也可以是安置理想的港湾。", options: [
                { text: "一把剖开现实伪善的手术刀。它应当带着淋漓的血迹，刺穿所有的岁月静好。", type: "REBEL" },
                { text: "一座精密的时钟。它让每一个齿轮都在因果律中严丝合缝，捕捉宇宙的节奏。", type: "SAGE" },
                { text: "一盏在迷雾海面上不断闪烁的、虚幻灯火。它不负责指路，只负责美感。", type: "IDEALIST" },
                { text: "一张永远折叠不完的地图。它不断在脚下延展，带我走向不可知的地平线。", type: "WANDERER" }
            ]},
            { id: 20, text: "如果你能变回一个‘标点符号’，你最想成为哪一个？", bookInfo: "语言符号学：叹号代表英雄，问号代表反抗，省略号则是留白。", options: [
                { text: "！：即便结局注定是陨落，我也要在消失前发出最后的嘶吼与肯定。", type: "HERO" },
                { text: "？：对所有既定的答案保持永久的挑衅。怀疑，是我唯一能确定的存在方式。", type: "REBEL" },
                { text: "……：在言语无法抵达的空白处，为灵魂保留最后一点唯美的有诗意的褶皱。", type: "IDEALIST" },
                { text: "—：指向远方。预示着故事在这一页之后，依然在不可知的荒野中延伸。", type: "WANDERER" }
            ]},
            { id: 21, text: "在《尤利西斯》那破碎且漫长的意识流独白中，你感到：", bookInfo: "《尤利西斯》：展现了内心世界那如潮汐般汹涌、不受时空约束的流动感。", options: [
                { text: "杂乱街道下隐藏的古典神话原型。原来一切琐碎的日常，都有其逻辑的对照。", type: "SAGE" },
                { text: "一种生理性的厌倦。我只想对这个喧嚣且异化的现代世界，竖起我的中指。", type: "REBEL" },
                { text: "内心的流转如潮水般真实。我正忙于捕捉每个转瞬即逝、带有神性的火花。", type: "IDEALIST" },
                { text: "这只是漫长归乡途中的一站。我的灵魂从不属于都柏林，我一直在路上。", type: "WANDERER" }
            ]},
            { id: 22, text: "如果你要为你的自传写下‘第一句话’，它会是：", bookInfo: "开场白美学：最伟大的第一句话，往往直接预告了整部作品的主体格调。", options: [
                { text: "“今天，我决定不再对这个世界，以及对我自己说谎。”", type: "REBEL" },
                { text: "“在一切逻辑开始之前，先有了那一抹绿光。”", type: "IDEALIST" },
                { text: "“一个人在荒野走得久了，也就不再需要名字了。”", type: "WANDERER" },
                { text: "“太阳照常升起，而我已准备好迎接那场必败的仗。”", type: "HERO" }
            ]},
            { id: 23, text: "当被要求向陈腐的规则妥协时，你的身体反应是：", bookInfo: "反抗精神：文学是对“必然”的挑衅。伟大的主角诞生于一次次对规则的拒绝中。", options: [
                { text: "生理性的作呕。我无法忍受哪怕一秒钟的表演，哪怕代价是彻底的崩塌。", type: "REBEL" },
                { text: "握紧拳头，思考如何优雅地在规则缝隙中，确立我作为人的最后尊严。", type: "HERO" },
                { text: "闭上眼睛。在脑内自动滤掉这些杂质，维持我理想人格的绝对纯洁。", type: "IDEALIST" },
                { text: "感到无趣。这种平庸的对抗，只会加速我离开这里的脚步。", type: "WANDERER" }
            ]},
            { id: 24, text: "你如何看待那个被预设好的‘结局’？", bookInfo: "叙事终局观：智者看重闭环，流浪者看重延展，而英雄看重祭献。", options: [
                { text: "结局是逻辑的收敛。是一个完美的、不可更改的数学闭环。", type: "SAGE" },
                { text: "没有结局。只有不断的推石上山，那个不断重复的过程就是我的全部。", type: "HERO" },
                { text: "结局应当是一场毁灭性的审美爆发。让一切在最华丽的一刻归于寂静。", type: "IDEALIST" },
                { text: "结局只是下一卷书的序言。真正的精彩，永远在地平线的下一页。", type: "WANDERER" }
            ]},
            { id: 25, text: "如果你能穿越进一本书里改变一个人的命运，你会去哪？", bookInfo: "悲剧核心：哈姆雷特的延宕、林黛玉的泪。遗憾是性格与命运编织的死结。", options: [
                { text: "《哈姆雷特》：帮他建立逻辑框架，让他别再忧郁，而是去解决问题。", type: "SAGE" },
                { text: "《红楼梦》：在大观园被烧毁前，记录下那些极致脆弱、带血的美感。", type: "IDEALIST" },
                { text: "《1984》：把那个秘密的角落，变成反抗体制永不陷落的堡垒。", type: "REBEL" },
                { text: "《百年孤独》：带着布恩迪亚家族的人走出马孔多，寻找下一片土地。", type: "WANDERER" }
            ]},
            { id: 26, text: "面对尼采所谓的‘深渊’，你会：", bookInfo: "深渊意象：尼采说“当你凝视深渊，深渊也在凝视你”。这象征了毁灭性的真相。", options: [
                { text: "测量它的深度，研究光在其中的折射规律。逻辑，是唯一的防护服。", type: "SAGE" },
                { text: "向它投下一颗发光的宝石。我想看它坠落时的轨迹美感，哪怕瞬间即逝。", type: "IDEALIST" },
                { text: "跃入其中。既然这世界如此荒诞，深渊也许是唯一的、诚实的出口。", type: "REBEL" },
                { text: "在边缘坐下，感受深渊吹来的风。然后，继续我那没有终点的漫游。", type: "WANDERER" }
            ]},
            { id: 27, text: "在《俄狄浦斯王》里，如果你明知逃避注定走向残酷结局，你会：", bookInfo: "《俄狄浦斯王》：它提出了关于主体意志与宿命论的终极拷问。", options: [
                { text: "我不需要这双只能看见表象的眼睛。既然肉眼看不见真理，我宁愿在黑暗里认领我的罪。", type: "REBEL" }, 
                { text: "冷眼观察命运的锁链是如何一环扣一环合拢的。逻辑的严密，有时高于个体的痛苦。", type: "SAGE" }, 
                { text: "虽然结局已定，但我追查真相的过程本身，就是我作为人的、最后的尊严。", type: "HERO" }, 
                { text: "在悲剧发生前远走他乡。即便结局注定，我也要在流浪中消耗掉余下的生命。", type: "WANDERER" }
            ]},
            { id: 28, text: "在《等待戈多》里，如果那个救世主始终没有来，你还会等下去吗？", bookInfo: "《等待戈多》：戈多代表了所有期盼、却永远不会抵达的东西。", options: [
                { text: "我会继续等。这种毫无指望的坚持本身，就是对我存在价值的最后肯定。", type: "HERO" },
                { text: "我会起身离开，戈多不来，我就去制造一个戈多，或者去寻找别的出口。", type: "WANDERER" },
                { text: "我会拆解‘等待’这个动作。研究这种集体焦虑背后的社会逻辑，比等谁更重要。", type: "SAGE" },
                { text: "我会对着那棵荒凉的树大笑。既然什么都不会发生，那就让这荒诞达到高潮。", type: "REBEL" }
            ]},
            { id: 29, text: "当你发现这世界其实是一场巨大的‘恶作剧’，你选择：", bookInfo: "现代派美学：文学是一面揭开世界荒诞本质的冷酷镜子。", options: [
                { text: "在恶作剧里建立一套我自己的、严密的私人秩序。这是我反客为主的唯一方式。", type: "SAGE" },
                { text: "既然是一场梦，那我就把它做成最美的那一个。美学是我对抗虚无的最后堡垒。", type: "IDEALIST" },
                { text: "作为一个生理性的抗拒者，我要在谢幕前，对这个导演竖起中指。", type: "REBEL" },
                { text: "在大笑中走向远方。只要我的脚步足够快，这场恶作剧就追不上我。", type: "WANDERER" }
            ]},
            { id: 30, text: "测试结束，如果你的生命必须坍缩为一卷书，你希望封底刻着哪句话？", bookInfo: "文学终极命题：每一个选择，都是在为你的灵魂副本签名。", options: [
                { text: "“他认领了自己的名字，并在众神的注视下，完成了一场必败的远征。”", type: "HERO" },
                { text: "“这是一份关于真相的临床审计报告，作者在逻辑的巅峰处隐身。”", type: "SAGE" },
                { text: "“他从未真正属于过任何书页，他只是一阵吹过文明废墟的咸涩海风。”", type: "WANDERER" },
                { text: "“所有的字迹都是血迹。他揭开了所有的面具，然后在大雾中离场。”", type: "REBEL" }
            ]}
        ];

        const StridingBirdIllustration = () => (
            <svg viewBox="0 0 400 400" className="w-full h-full">
                <circle cx="80" cy="100" r="15" fill="white" opacity="0.05" />
                <circle cx="320" cy="150" r="20" fill="white" opacity="0.05" />
                <line x1="180" y1="260" x2="140" y2="330" className="bird-leg" />
                <line x1="220" y1="260" x2="280" y2="330" className="bird-leg" />
                <line x1="140" y1="330" x2="110" y2="335" className="bird-leg" />
                <line x1="280" y1="330" x2="315" y2="295" className="bird-leg" />
                <path d="M150 200 Q 180 150 250 200 Q 300 220 320 260 L 180 260 Z" className="bird-body" />
                <path d="M150 200 Q 130 200 100 215 L 145 230 Z" fill="#2a6fdb" />
                <path d="M165 210 Q 175 205 185 210" fill="none" stroke="white" strokeWidth="2" opacity="0.8" />
                <path d="M200 230 Q 240 220 280 240" fill="none" stroke="white" strokeWidth="1" opacity="0.3" />
                <ellipse cx="200" cy="345" rx="100" ry="5" fill="white" opacity="0.1" />
            </svg>
        );

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [scores, setScores] = useState({ REBEL: 0, SAGE: 0, IDEALIST: 0, WANDERER: 0, HERO: 0 });
            const [history, setHistory] = useState([]);
            const [result, setResult] = useState(null);
            const [isSaving, setIsSaving] = useState(false);

            const radarCanvas = useRef(null);
            const captureRef = useRef(null);
            const chartRef = useRef(null);

            const handleAnswer = (type) => {
                const newScores = { ...scores, [type]: scores[type] + 1 };
                setHistory([...history, { scores, currentQuestion }]);
                setScores(newScores);
                if (currentQuestion < 29) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    const topArchetype = Object.keys(newScores).reduce((a, b) => newScores[a] > newScores[b] ? a : b);
                    const MAP = {
                        REBEL: ["MEURSAULT", "HOLDEN", "RASKOLNIKOV", "OFFRED", "HESTER"],
                        SAGE: ["SIDDHARTHA", "HOLMES", "ELIZABETH", "DALLOWAY", "ORLANDO"],
                        IDEALIST: ["GATSBY", "QUIXOTE", "BOVARY", "JO_MARCH"],
                        WANDERER: ["ISHMAEL", "TESS", "DALLOWAY", "ORLANDO"],
                        HERO: ["SANTIAGO", "JANE_EYRE", "VALJEAN", "KARENINA"]
                    };
                    const pool = MAP[topArchetype] || ["GATSBY"];
                    const key = pool[Math.floor(Math.random() * pool.length)];
                    setResult(ARCHETYPES[key]);
                    setStep('result');
                    window.scrollTo(0, 0);
                }
            };

            const handleBack = () => { if (history.length > 0) { const last = history.pop(); setScores(last.scores); setCurrentQuestion(last.currentQuestion); setHistory([...history]); } else setStep('welcome'); };
            const handleRestart = () => { if (chartRef.current) chartRef.current.destroy(); chartRef.current = null; setStep('welcome'); setCurrentQuestion(0); setScores({ REBEL: 0, SAGE: 0, IDEALIST: 0, WANDERER: 0, HERO: 0 }); setHistory([]); setResult(null); window.scrollTo(0, 0); };

            useEffect(() => {
                if (step === 'result' && result && radarCanvas.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    const ctx = radarCanvas.current.getContext('2d');
                    chartRef.current = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['反叛', '智性', '感性', '自由', '意志'],
                            datasets: [{ data: result.stats, backgroundColor: 'rgba(241, 196, 15, 0.15)', borderColor: COLORS.accentYellow, borderWidth: 1.5, pointRadius: 2, pointBackgroundColor: COLORS.accentYellow }]
                        },
                        options: { scales: { r: { angleLines: { color: 'rgba(255,255,255,0.1)' }, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { display: false }, pointLabels: { color: '#a5c6e5', font: { size: 10 } }, min: 0, max: 100 } }, plugins: { legend: { display: false } } }
                    });
                }
            }, [step, result]);

            const saveAsImage = async () => {
                if (typeof html2canvas === 'undefined') return;
                setIsSaving(true);
                try {
                    const canvas = await html2canvas(captureRef.current, { scale: 2, backgroundColor: COLORS.bg, useCORS: true });
                    const link = document.createElement('a');
                    link.download = `文学报告-${result.name}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (err) { console.error(err); }
                setIsSaving(false);
            };

            return (
                <div className="max-w-xl mx-auto px-4 py-8 min-h-screen">
                    {step === 'welcome' && (
                        <div className="animate-fade-in text-center space-y-12">
                            <div className="text-left pt-6">
                                <div className="inline-block px-3 py-1 bg-[#f2f0e9] text-[#123e66] text-[9px] tracking-widest font-sans mb-4 transform -rotate-2 uppercase font-bold">Archetype Analysis</div>
                                <h1 className="text-4xl md:text-5xl font-light leading-tight tracking-widest text-white">你是文学里的<br /><span className="font-bold border-b-4 border-[#f1c40f]">哪位主角？</span></h1>
                            </div>
                            <div className="w-full max-w-[360px] mx-auto aspect-square relative">
                                <StridingBirdIllustration />
                            </div>
                            <div className="space-y-10">
                                <p className="text-xs text-[#a5c6e5] leading-relaxed tracking-wider px-6 font-light italic">“创作是从看见自己开始的，而文学，是你在精神废墟上重建主体性的最后一次存证。”</p>
                                <button onClick={() => setStep('quiz')} className="w-full py-6 glass-card text-white text-[11px] tracking-[0.8em] font-bold flex items-center justify-center transition-all shadow-lg active:scale-95">开启漫游 / PROCEED</button>
                                <div className="text-[10px] text-gray-400 tracking-[0.3em]">Based on Library of Souls | Final Edition</div>
                            </div>
                        </div>
                    )}

                    {step === 'quiz' && (
                        <div className="animate-fade-in space-y-8 text-center pb-12">
                            <div className="flex justify-between items-center border-b border-white border-opacity-10 pb-4">
                                <button onClick={handleBack} className="flex items-center gap-1 text-[10px] uppercase text-[#a5c6e5] hover:text-white transition-all">BACK</button>
                                <span className="text-[9px] uppercase text-[#a5c6e5] font-bold tracking-widest">CHAPTER {String(currentQuestion + 1).padStart(2, '0')} / 30</span>
                                <div className="w-10"></div>
                            </div>
                            <div className="space-y-4">
                                <h2 className="text-lg md:text-xl leading-relaxed min-h-[100px] flex items-center justify-center italic px-4 text-white font-light">{QUESTIONS[currentQuestion].text}</h2>
                            </div>
                            <div className="space-y-4 text-left">
                                {QUESTIONS[currentQuestion].options.map((option, idx) => (
                                    <button key={idx} onClick={() => handleAnswer(option.type)} className="w-full p-6 glass-card rounded-[16px] hover:bg-white hover:bg-opacity-10 transition-all text-left group active:bg-opacity-20">
                                        <span className="text-[14px] text-[#f2f0e9] group-hover:text-white leading-relaxed pr-4">{option.text}</span>
                                    </button>
                                ))}
                            </div>
                            <div className="book-archive-card p-5 rounded-2xl text-left animate-fade-in">
                                <div className="flex items-center gap-2 mb-2">
                                    <div className="w-1 h-3 bg-[#f1c40f]"></div>
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-[#f1c40f]">Masterpiece Archive / 名著档案</span>
                                </div>
                                <p className="text-[11px] leading-relaxed text-[#a5c6e5] opacity-90 italic">{QUESTIONS[currentQuestion].bookInfo}</p>
                            </div>
                            <div className="pt-6 flex justify-center">
                                <div className="h-[2px] w-48 bg-white bg-opacity-10 relative"><div className="h-full bg-[#f1c40f] transition-all duration-700 shadow-[0_0_10px_#f1c40f]" style={{width: `${((currentQuestion+1)/30)*100}%`}}></div></div>
                            </div>
                        </div>
                    )}

                    {step === 'result' && result && (
                        <div className="animate-fade-in space-y-8 pb-12">
                            <div ref={captureRef} className="p-4 space-y-12 bg-[#123e66]">
                                <div className="text-center space-y-6 py-12 glass-card rounded-2xl relative overflow-hidden border border-white border-opacity-10">
                                    <span className="text-[10px] font-bold uppercase tracking-[0.5em] text-[#f1c40f]">Protagonist Archetype Profile</span>
                                    <h2 className="text-3xl md:text-4xl font-bold text-white tracking-widest px-2">{result.name}</h2>
                                    <p className="text-sm text-[#a5c6e5] italic tracking-[0.4em]">{result.sub}</p>
                                    <div className="flex justify-center gap-4 pt-4">
                                        <span className="px-3 py-1 bg-[#f1c40f] text-[#123e66] text-[9px] font-bold uppercase">灵魂副本存证</span>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center glass-card p-8 rounded-2xl relative border border-white border-opacity-10">
                                    <div className="absolute -top-3 -right-3 px-3 py-1 bg-[#f1c40f] text-[#123e66] text-[10px] font-bold transform rotate-3 shadow-lg">DOC: LITERARY-SOUL</div>
                                    <div className="space-y-4 text-left">
                                        <h4 className="text-[11px] font-bold border-b border-white border-opacity-10 pb-2 text-white uppercase tracking-wider">人格向量分析</h4>
                                        <div className="space-y-3 text-[10px]">
                                            <div className="flex justify-between items-center text-[#a5c6e5]"><span>意志/尊严</span><div className="w-24 h-1 bg-white bg-opacity-10"><div className="h-full bg-[#e4979e]" style={{width:`${result.stats[4] || 80}%`}}></div></div></div>
                                            <div className="flex justify-between items-center text-[#a5c6e5]"><span>智性/逻辑</span><div className="w-24 h-1 bg-white bg-opacity-10"><div className="h-full bg-[#35afcb]" style={{width:`${result.stats[1]}%`}}></div></div></div>
                                            <div className="flex justify-between items-center text-[#a5c6e5]"><span>自由/反叛</span><div className="w-24 h-1 bg-white bg-opacity-10"><div className="h-full bg-[#f1c40f]" style={{width:`${result.stats[0]}%`}}></div></div></div>
                                        </div>
                                    </div>
                                    <div className="aspect-square w-full max-w-[200px] mx-auto"><canvas ref={radarCanvas}></canvas></div>
                                </div>
                                <div className="relative p-12 glass-card border border-white border-opacity-10 rounded-2xl text-center">
                                    <p className="text-xl leading-relaxed mb-6 font-medium text-white italic">“{result.quote}”</p>
                                    <div className="text-[10px] text-[#f1c40f] tracking-widest uppercase font-bold text-center">— {result.quoteSource} —</div>
                                </div>
                                <div className="space-y-10 px-2 text-left">
                                    <section className="space-y-4">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-white border-opacity-10 pb-2 text-[#a5c6e5]">灵魂解剖 / THE ESSENCE</h4>
                                        <div className="p-6 border-l-4 border-[#f1c40f] glass-card rounded-r-2xl space-y-4">
                                            <p className="text-[13px] leading-relaxed text-[#a5c6e5] italic">“{result.identity}”</p>
                                            <p className="text-[13px] leading-relaxed font-light text-white opacity-90">{result.longDesc}</p>
                                        </div>
                                    </section>
                                    <section className="space-y-4">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-white border-opacity-10 pb-2 text-[#e4979e]">存在主义焦虑</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-[12px]">
                                            <div className="p-4 bg-white bg-opacity-5 rounded-xl border border-white border-opacity-10">
                                                <div className="font-bold mb-1 text-[#e4979e]">主导焦虑</div>
                                                <div className="text-white opacity-70">{result.anxiety}</div>
                                            </div>
                                            <div className="p-4 bg-white bg-opacity-5 rounded-xl border border-white border-opacity-10">
                                                <div className="font-bold mb-1 text-[#a5c6e5]">人格阴影</div>
                                                <div className="text-white opacity-70">{result.shadow}</div>
                                            </div>
                                        </div>
                                    </section>
                                    <section className="space-y-6">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-white border-opacity-10 pb-2 text-[#a5c6e5]">关联阅读推荐</h4>
                                        <div className="grid gap-4">
                                            {result.books && result.books.map((book, i) => (
                                                <div key={i} className="glass-card p-6 rounded-2xl border border-white border-opacity-10 group">
                                                    <h5 className="text-[15px] font-bold mb-1 text-white">{book.title}</h5>
                                                    <p className="text-10px text-[#f1c40f] font-bold mb-2 uppercase">作者: {book.author}</p>
                                                    <p className="text-xs text-[#a5c6e5] italic leading-relaxed">{book.desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>
                            <div className="pt-8 space-y-4 text-center px-4">
                                <button onClick={saveAsImage} disabled={isSaving} className="w-full py-5 bg-[#f1c40f] text-[#123e66] text-[11px] font-bold uppercase tracking-[0.5em] flex items-center justify-center gap-3 shadow-[0_10px_30px_rgba(241,196,15,0.3)] active:scale-95 transition-all">{isSaving ? "生成中..." : "保存灵魂手稿 / SAVE REPORT"}</button>
                                <button onClick={handleRestart} className="w-full py-5 border border-white border-opacity-20 text-white text-[11px] font-bold uppercase tracking-[0.5em] hover:bg-white hover:bg-opacity-5 transition-all">重新开启叙事</button>
                            </div>
                        </div>
                    )}
                    <footer className="mt-16 pt-16 border-t border-white border-opacity-10 text-center space-y-4">
                        <p className="text-[10px] tracking-[0.6em] uppercase text-[#a5c6e5] font-bold opacity-60">© 2026 CURATED BY @云树CLOUDTREE</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
