                                        <div className="p-8 border-l-4 border-[#f1c40f] glass-card rounded-r-2xl space-y-6 bg-white bg-opacity-[0.02]">
                                            <p className="text-[15px] leading-relaxed text-[#f1c40f] italic font-medium">“{result.identity}”</p>
                                            <div className="text-[14px] leading-relaxed font-light text-white text-opacity-90 space-y-4">
                                                {result.longDesc.split('。').map((s, i) => s && <p key={i} className="indent-text">{s}。</p>)}
                                            </div>
                                        </div>
                                    </section>

                                    <section className="space-y-6">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-white border-opacity-10 pb-2 text-[#e4979e]">存在主义焦虑与阴影</h4>
                                        <div className="grid grid-cols-1 gap-6">
                                            <div className="p-6 bg-white bg-opacity-[0.03] rounded-2xl border border-white border-opacity-10 group hover:bg-opacity-5 transition-all">
                                                <div className="font-bold mb-2 text-[#e4979e] flex items-center gap-2">
                                                    <div className="w-1 h-3 bg-[#e4979e]"></div>主导焦虑 / ANXIETY
                                                </div>
                                                <div className="text-[13px] text-white opacity-80 leading-relaxed italic">{result.anxiety}</div>
                                            </div>
                                            <div className="p-6 bg-white bg-opacity-[0.03] rounded-2xl border border-white border-opacity-10 group hover:bg-opacity-5 transition-all">
                                                <div className="font-bold mb-2 text-[#a5c6e5] flex items-center gap-2">
                                                    <div className="w-1 h-3 bg-[#a5c6e5]"></div>人格阴影 / SHADOW
                                                </div>
                                                <div className="text-[13px] text-white opacity-80 leading-relaxed italic">{result.shadow}</div>
                                            </div>
                                        </div>
                                    </section>

                                    <section className="space-y-8">
                                        <div className="flex items-center justify-between border-b border-white border-opacity-10 pb-2">
                                            <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] text-[#a5c6e5]">深度阅读图鉴 / CURATED LIBRARY</h4>
                                            <div className="px-2 py-0.5 bg-[#f1c40f] text-[#123e66] text-[8px] font-bold uppercase rounded tracking-tighter shadow-sm">Literary Compass</div>
                                        </div>
                                        <div className="grid gap-6">
                                            {result.books && result.books.map((book, i) => (
                                                <div key={i} className="glass-card p-6 rounded-2xl border border-white border-opacity-10 group relative overflow-hidden active:scale-[0.98] transition-all">
                                                    <div className="absolute top-0 right-0 w-24 h-24 bg-[#f1c40f] opacity-5 transform rotate-45 translate-x-12 -translate-y-12 group-hover:opacity-10 transition-all"></div>
                                                    <h5 className="text-[17px] font-bold mb-1 text-white group-hover:text-[#f1c40f] transition-colors">{book.title}</h5>
                                                    <p className="text-[10px] text-[#f1c40f] font-bold mb-4 uppercase tracking-[0.2em] opacity-80">AUTHOR: {book.author}</p>
                                                    <p className="text-xs text-[#a5c6e5] italic leading-relaxed pl-5 border-l-2 border-white border-opacity-20">{book.desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>
                            <div className="pt-8 space-y-4 text-center px-4">
                                <button onClick={saveAsImage} disabled={isSaving} className="w-full py-6 bg-[#f1c40f] text-[#123e66] text-[12px] font-bold uppercase tracking-[0.6em] flex items-center justify-center gap-3 shadow-[0_15px_35px_rgba(241,196,15,0.3)] active:scale-95 transition-all">{isSaving ? "GENESIS REPORT..." : "保存灵魂手稿 / DOWNLOAD FILE"}</button>
                                <button onClick={handleRestart} className="w-full py-5 border border-white border-opacity-20 text-white text-[11px] font-bold uppercase tracking-[0.5em] hover:bg-white hover:bg-opacity-5 active:scale-95 transition-all">重新开启叙事</button>
                            </div>
                        </div>
                    )}
                    <footer className="mt-20 pt-16 border-t border-white border-opacity-10 text-center space-y-6">
                        <div className="flex justify-center gap-2 opacity-20"><div className="w-1 h-1 bg-white rounded-full"></div><div className="w-1 h-1 bg-white rounded-full"></div><div className="w-1 h-1 bg-white rounded-full"></div></div>
                        <p className="text-[10px] tracking-[0.8em] uppercase text-[#a5c6e5] font-bold opacity-60">© 2026 curated by @云树cloudtree</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
